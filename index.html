<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* ==========================
   Google Fontyes
========================== */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
    height:100vh;
    overflow:hidden;
}

/* ==========================
   Main Layout
========================== */

.container{
    display:flex;
    width:100%;
    height:100vh;
}

/* ==========================
   Sidebar
========================== */

.sidebar{
    width:300px;
    background:#111827;
    border-right:1px solid #2d3748;
    display:flex;
    flex-direction:column;
    padding:20px;
}

.logo{
    font-size:26px;
    font-weight:700;
    text-align:center;
    margin-bottom:30px;
}

.new-chat{
    background:#3b82f6;
    color:white;
    border:none;
    padding:14px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

.new-chat:hover{
    background:#2563eb;
}

.search-box{
    margin:20px 0;
    position:relative;
}

.search-box input{
    width:100%;
    padding:12px 15px;
    padding-left:40px;
    border:none;
    border-radius:10px;
    background:#1f2937;
    color:white;
}

.search-box i{
    position:absolute;
    left:15px;
    top:13px;
    color:#94a3b8;
}

.history-title{
    font-size:14px;
    color:#94a3b8;
    margin-bottom:10px;
}

.chat-history{
    overflow-y:auto;
    flex:1;
}

.history-item{
    background:#1e293b;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    transition:.3s;
}

.history-item:hover{
    background:#334155;
}

.history-item button{
    background:none;
    border:none;
    color:#ef4444;
    cursor:pointer;
}

/* ==========================
   Chat Section
========================== */

.chat-container{
    flex:1;
    display:flex;
    flex-direction:column;
    background:#0f172a;
}

.chat-header{
    height:80px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 30px;
    border-bottom:1px solid #1e293b;
}

.chat-header h2{
    font-size:24px;
}

.chat-header p{
    color:#94a3b8;
    font-size:14px;
}

#clearChat{
    padding:10px 18px;
    background:#ef4444;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#clearChat:hover{
    background:#dc2626;
}

/* ==========================
   Chat Box
========================== */

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:30px;
}

.welcome{
    text-align:center;
    margin-top:100px;
}

.bot-icon{
    font-size:60px;
    margin-bottom:20px;
}

/* ==========================
   Messages
========================== */

.message{
    max-width:70%;
    padding:14px 18px;
    border-radius:15px;
    margin-bottom:20px;
    animation:fadeIn .3s;
    line-height:1.6;
}

.user{
    margin-left:auto;
    background:#2563eb;
}

.bot{
    background:#1e293b;
}

/* ==========================
   Input
========================== */

.chat-input{
    display:flex;
    align-items:center;
    gap:15px;
    padding:20px;
    border-top:1px solid #1e293b;
}

.chat-input textarea{
    flex:1;
    resize:none;
    height:55px;
    border:none;
    outline:none;
    border-radius:12px;
    padding:15px;
    background:#1e293b;
    color:white;
    font-size:15px;
}

.chat-input button{
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:#3b82f6;
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

.chat-input button:hover{
    transform:scale(1.1);
    background:#2563eb;
}

/* ==========================
   Typing Indicator
========================== */

.typing{
    display:flex;
    gap:5px;
    margin-left:30px;
    margin-bottom:10px;
}

.typing span{
    width:10px;
    height:10px;
    background:#94a3b8;
    border-radius:50%;
    animation:bounce .8s infinite;
}

.typing span:nth-child(2){
    animation-delay:.2s;
}

.typing span:nth-child(3){
    animation-delay:.4s;
}

.hidden{
    display:none;
}

/* ==========================
   Scrollbar
========================== */

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#475569;
    border-radius:10px;
}

/* ==========================
   Animations
========================== */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes bounce{
    0%,80%,100%{
        transform:scale(0);
    }
    40%{
        transform:scale(1);
    }
}

/* ==========================
   Responsive
========================== */

@media(max-width:768px){

.sidebar{
    display:none;
}

.chat-header{
    padding:15px;
}

.chat-box{
    padding:20px;
}

.message{
    max-width:90%;
}

.chat-input{
    padding:15px;
}

.chat-input textarea{
    height:50px;
}

}
    </style>
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            🤖 <span>AI Chatbot</span>
        </div>

        <button id="newChatBtn" class="new-chat">
            <i class="bi bi-plus-circle"></i>
            New Chat
        </button>

        <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text"
                placeholder="Search conversations..."
                id="searchChat">
        </div>

        <div class="history-title">
            Recent Chats
        </div>

        <div id="chatHistory" class="chat-history">

        </div>


    </aside>

    <!-- Main Chat -->

    <main class="chat-container">

        <!-- Header -->

        <header class="chat-header">

            <div>

                <h2>AI Assistant</h2>

                <p>Ask anything...</p>

            </div>

            <button id="clearChat">

                <i class="bi bi-trash"></i>

                Clear Chat

            </button>

        </header>


        <!-- Messages -->

        <section id="chatBox" class="chat-box">

            <!-- Welcome -->

            <div class="welcome">

                <div class="bot-icon">

                    🤖

                </div>

                <h2>Welcome!</h2>

                <p>

                    Start chatting with your AI assistant.

                </p>

            </div>

            <!-- Messages appear here -->

        </section>


        <!-- Typing -->

        <div id="typing" class="typing hidden">

            <span></span>

            <span></span>

            <span></span>

        </div>


        <!-- Input -->

        <footer class="chat-input">

            <textarea

                id="message"

                rows="1"

                placeholder="Type your message...">

            </textarea>

            <button id="sendBtn">

                <i class="bi bi-send-fill"></i>

            </button>

        </footer>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
